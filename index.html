<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>segmind@portfolio: ~</title>
  <meta name="description" content="SegMind25 — Interactive Terminal Portfolio v3.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════════ */
    :root {
      --bg:        #080b0f;
      --surface:   #0d1117;
      --surface2:  #111820;
      --border:    #1e2a35;
      --border2:   #243040;
      --text:      #c9d1d9;
      --dim:       #4a5568;
      --dim2:      #6b7a90;

      --green:     #39d353;
      --green2:    #26a641;
      --blue:      #58a6ff;
      --blue2:     #388bfd;
      --yellow:    #e3b341;
      --red:       #f85149;
      --purple:    #bc8cff;
      --orange:    #ffa657;
      --cyan:      #79c0ff;
      --teal:      #2ea043;

      --glow-green: 0 0 8px rgba(57,211,83,0.35);
      --glow-blue:  0 0 8px rgba(88,166,255,0.35);

      --radius:    10px;
      --font:      'JetBrains Mono', 'Fira Code', monospace;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      /* subtle noise grain */
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(88,166,255,0.06) 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }

    /* ══════════════════════════════════════════
       TERMINAL SHELL
    ══════════════════════════════════════════ */
    .term {
      width: 940px;
      height: 640px;
      max-width: 97vw;
      max-height: 94dvh;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 40px 100px rgba(0,0,0,0.7),
        0 0 40px rgba(57,211,83,0.04);
      animation: termIn .4s cubic-bezier(.16,1,.3,1) both;
      position: relative;
    }
    @keyframes termIn {
      from { opacity:0; transform:translateY(18px) scale(.98); }
      to   { opacity:1; transform:none; }
    }

    /* scanlines overlay */
    .term::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 10;
      border-radius: var(--radius);
    }

    /* ── Title Bar ── */
    .term-bar {
      height: 40px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
      position: relative;
      user-select: none;
    }

    .dots { display:flex; gap:8px; }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #2a3441;
      transition: background .2s, box-shadow .2s;
    }
    .term:hover .dot.r { background:#ff5f57; box-shadow:0 0 6px rgba(255,95,87,.5); }
    .term:hover .dot.y { background:#febc2e; box-shadow:0 0 6px rgba(254,188,46,.5); }
    .term:hover .dot.g { background:#28c840; box-shadow:0 0 6px rgba(40,200,64,.5); }

    .bar-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11.5px;
      color: var(--dim2);
      letter-spacing: .03em;
    }
    .bar-icon { color: var(--green); font-size: 10px; }
    #barTitle { color: var(--dim2); }

    .bar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .bar-badge {
      font-size: 10px;
      color: var(--dim);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 1px 7px;
      letter-spacing: .05em;
    }

    /* ── Body ── */
    .term-body {
      flex: 1;
      padding: 18px 22px 12px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.7;
      scroll-behavior: smooth;
      position: relative;
    }
    .term-body::-webkit-scrollbar { width: 5px; }
    .term-body::-webkit-scrollbar-track { background: transparent; }
    .term-body::-webkit-scrollbar-thumb { background:#1e2a35; border-radius:4px; }
    .term-body::-webkit-scrollbar-thumb:hover { background:#2a3a4a; }

    /* ── Footer ── */
    .term-foot {
      height: 26px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 10px;
      color: var(--dim);
      flex-shrink: 0;
      letter-spacing: .04em;
    }
    .foot-seg {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .foot-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: var(--glow-green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; }
      50%      { opacity:.4; }
    }

    /* ══════════════════════════════════════════
       PROMPT & INPUT
    ══════════════════════════════════════════ */
    .line {
      margin-bottom: 2px;
      white-space: pre-wrap;
      word-break: break-all;
      animation: fadeIn .12s ease both;
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(2px); }
      to   { opacity:1; transform:none; }
    }

    .ps1 .u { color: var(--green);  font-weight:700; }
    .ps1 .at{ color: var(--dim2); }
    .ps1 .h { color: var(--blue);   font-weight:700; }
    .ps1 .c { color: var(--dim2); }
    .ps1 .d { color: var(--purple); font-weight:500; }
    .ps1 .s { color: var(--yellow); font-weight:700; }

    .input-row {
      display: flex;
      align-items: center;
      margin-top: 2px;
    }
    #in {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font: inherit;
      outline: none;
      caret-color: transparent;
      margin-left: 7px;
    }
    .cursor-block {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--green);
      box-shadow: var(--glow-green);
      animation: blink 1.1s step-end infinite;
      vertical-align: middle;
      margin-left: 1px;
      border-radius: 1px;
    }
    @keyframes blink { 50%{ opacity:0; } }

    /* ══════════════════════════════════════════
       OUTPUT COLOUR TOKENS
    ══════════════════════════════════════════ */
    .out   { color:#a0b0c0; padding-left:2px; }
    .c-g   { color:var(--green); }
    .c-b   { color:var(--blue); }
    .c-y   { color:var(--yellow); }
    .c-r   { color:var(--red); }
    .c-p   { color:var(--purple); }
    .c-o   { color:var(--orange); }
    .c-c   { color:var(--cyan); }
    .c-dim { color:var(--dim2); }
    .c-tx  { color:var(--text); }
    .b     { font-weight:700; }
    .dir   { color:var(--blue); font-weight:700; }
    .sym   { color:var(--cyan); }

    /* clickable link */
    .lnk {
      color:var(--text);
      cursor:pointer;
      border-bottom:1px dashed var(--dim);
      transition:color .15s, border-color .15s;
    }
    .lnk:hover { color:var(--green); border-color:var(--green); }

    /* ══════════════════════════════════════════
       TAB COMPLETION MENU
    ══════════════════════════════════════════ */
    .tab-menu {
      display: flex;
      flex-wrap: wrap;
      gap: 3px 8px;
      margin: 5px 0;
      padding: 6px 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border2);
      border-radius: 6px;
    }
    .tab-item {
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      transition: background .1s, color .1s;
    }
    .tab-item.active {
      background: var(--blue2);
      color: #fff;
      font-weight: 700;
    }

    /* ══════════════════════════════════════════
       HELP TABLE / SECTIONS
    ══════════════════════════════════════════ */
    .help-section { margin-bottom: 10px; }
    .help-title {
      color: var(--cyan);
      font-weight: 700;
      letter-spacing: .08em;
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
    }
    .help-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 0 8px;
      padding: 1px 0;
    }
    .help-cmd  { color: var(--yellow); }
    .help-desc { color: var(--dim2); }

    /* ══════════════════════════════════════════
       NEOFETCH LAYOUT
    ══════════════════════════════════════════ */
    .neo-wrap {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0 24px;
      font-size: 12.5px;
    }
    .neo-logo { white-space: pre; line-height: 1.25; }
    .neo-info { padding-top: 4px; }
    .neo-row { display: grid; grid-template-columns: 100px 1fr; gap: 0 6px; }
    .neo-key { color: var(--blue); font-weight: 700; }
    .neo-sep { color: var(--dim2); }
    .neo-val { color: var(--text); }
    .neo-bar { margin-top: 8px; letter-spacing: -.5px; }

    /* ══════════════════════════════════════════
       WELCOME BANNER
    ══════════════════════════════════════════ */
    .banner-art {
      white-space: pre;
      line-height: 1.2;
      font-size: 11px;
      color: var(--green);
      text-shadow: 0 0 12px rgba(57,211,83,0.4);
    }
    .banner-divider {
      color: var(--border2);
      margin: 6px 0 4px;
    }
    .banner-info { font-size: 12px; }

    /* ══════════════════════════════════════════
       MOBILE
    ══════════════════════════════════════════ */
    @media (max-width:600px) {
      .term {
        width:100%; height:100dvh;
        max-width:none; max-height:none;
        border:none; border-radius:0;
      }
      .term-body { font-size:11.5px; padding:12px 14px; }
      .banner-art { font-size:7px; }
      .neo-wrap { grid-template-columns:1fr; }
      .neo-logo { display:none; }
    }

    /* ══════════════════════════════════════════
       EXIT OVERLAY
    ══════════════════════════════════════════ */
    .exit-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease;
    }
    .exit-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .exit-icon {
      font-size: 36px;
      animation: exitPulse .9s ease-in-out infinite;
    }
    @keyframes exitPulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(.92); }
    }
    .exit-text {
      font-family: var(--font);
      font-size: 14px;
      color: var(--green);
      letter-spacing: .1em;
      text-shadow: var(--glow-green);
    }
    .exit-sub {
      font-family: var(--font);
      font-size: 11px;
      color: var(--dim2);
      letter-spacing: .06em;
    }
    .exit-bar-wrap {
      width: 220px;
      height: 3px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
    }
    .exit-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green2), var(--green));
      box-shadow: var(--glow-green);
      border-radius: 2px;
      transition: width 1.8s linear;
    }
  </style>
</head>
<body>

<div class="term">

  <!-- ── Title Bar ── -->
  <div class="term-bar">

<script>
/* ════════════════════════════════════════════════
   VIRTUAL FILE SYSTEM
════════════════════════════════════════════════ */

  '/home/segmind': {
    type: 'd',
    children: {
      'README.md': {

        type: 'f',
        content: `Gaming   youtube.com/@SegMind25\nCoding   youtube.com/@SegError\nTikTok   tiktok.com/@segmind25\nDiscord  discord.gg/WeUYH3x9Cr\nGitHub   github.com/SegMind25`
      },

      'discord.link': { type:'link', url:'https://discord.gg/WeUYH3x9Cr',          content:'💬 Discord — discord.gg/WeUYH3x9Cr' },
      'github.link':  { type:'link', url:'https://github.com/SegMind25',            content:'🐙 GitHub — github.com/SegMind25' },
      'projects': {
        type: 'd',
        children: {
          'README.md': {
            type: 'f',
            content: `Projects — github.com/SegMind25\n\n• Terminal Portfolio   This interactive terminal\n• Tutorial Series      Educational content\n• Community Tools      Discord bots & utilities`
          }
        }
      }
    }
  }
};

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
let cwd    = '/home/segmind';
let hist   = [];
let histIdx = -1;
let tabMatches = [], tabIdx = -1, tabBase = '', tabMenuEl = null;

/* ════════════════════════════════════════════════
   DOM REFS
════════════════════════════════════════════════ */
const $out   = document.getElementById('out');
const $in    = document.getElementById('in');
const $body  = document.getElementById('body');
const $path  = document.getElementById('ps1Path');
const $bar   = document.getElementById('barTitle');
const $clock = document.getElementById('clock');

/* ════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════ */
const esc = s => {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
};

const fmtPath = p =>
  p === '/home/segmind' ? '~'
  : p.startsWith('/home/segmind/') ? '~/' + p.slice(14)
  : p;

const resolve = p => {
  if (!p || p === '~') return '/home/segmind';
  if (p.startsWith('~/')) p = '/home/segmind/' + p.slice(2);
  if (!p.startsWith('/')) p = cwd === '/' ? '/' + p : cwd + '/' + p;
  const parts = [];
  for (const s of p.split('/')) {
    if (s === '..') parts.pop();
    else if (s && s !== '.') parts.push(s);
  }
  return '/' + parts.join('/');
};

const getNode = path => {
  for (const root of Object.keys(FS)) {
    if (path === root) return FS[root];
    if (path.startsWith(root + '/')) {
      let node = FS[root];
      for (const seg of path.slice(root.length + 1).split('/')) {
        if (!node.children || !node.children[seg]) return null;
        node = node.children[seg];
      }
      return node;
    }
  }
  return null;
};

const print = html => {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  $out.appendChild(div);
};

const printRaw = html => {
  // No animation for welcome block
  const div = document.createElement('div');
  div.innerHTML = html;
  $out.appendChild(div);
};

const prompt$ = () =>
  `<span class="ps1"><span class="u">segmind</span><span class="at">@</span><span class="h">portfolio</span><span class="c">:</span><span class="d">${esc(fmtPath(cwd))}</span><span class="s"> $</span></span>`;

const printPrompt = cmd => {
  print(`${prompt$()} <span class="c-tx">${esc(cmd)}</span>`);
};

const scroll = () => { $body.scrollTop = $body.scrollHeight; };

const updatePath = () => {
  const fp = fmtPath(cwd);
  $path.textContent = fp;
  $bar.textContent  = `segmind@portfolio: ${fp}`;
};

/* ════════════════════════════════════════════════
   LINKS
════════════════════════════════════════════════ */
const LINKS = {
  gaming:   'https://www.youtube.com/@SegMind25',
  coding:   'https://www.youtube.com/@SegError',
  tiktok:   'https://www.tiktok.com/@segmind25',
  discord:  'https://discord.gg/WeUYH3x9Cr',
  github:   'https://github.com/SegMind25',
  projects: 'https://github.com/SegMind25',
};

/* ════════════════════════════════════════════════
   COMMANDS
════════════════════════════════════════════════ */
const CMD = {

  /* ── help ── */
  help: () => `<div class="out">
<div class="help-title">── Navigation ──────────────────────</div>
<div class="help-row"><span class="help-cmd">ls [-la] [path]</span><span class="help-desc">list directory contents</span></div>
<div class="help-row"><span class="help-cmd">cd [path]</span><span class="help-desc">change directory  ( ~  ..  /path )</span></div>

<div class="help-row"><span class="help-cmd">tree</span><span class="help-desc">display directory tree</span></div>

<div class="help-title" style="margin-top:8px">── File Operations ─────────────────</div>
<div class="help-row"><span class="help-cmd">cat &lt;file&gt;</span><span class="help-desc">display file contents</span></div>
<div class="help-row"><span class="help-cmd">touch &lt;name&gt;</span><span class="help-desc">create empty file</span></div>
<div class="help-row"><span class="help-cmd">mkdir &lt;name&gt;</span><span class="help-desc">create directory</span></div>
<div class="help-row"><span class="help-cmd">rm &lt;name&gt;</span><span class="help-desc">remove file or directory</span></div>

<div class="help-title" style="margin-top:8px">── Utilities ───────────────────────</div>
<div class="help-row"><span class="help-cmd">echo &lt;text&gt;</span><span class="help-desc">print text to output</span></div>
<div class="help-row"><span class="help-cmd">whoami</span><span class="help-desc">current user info</span></div>
<div class="help-row"><span class="help-cmd">date</span><span class="help-desc">current date and time</span></div>
<div class="help-row"><span class="help-cmd">history</span><span class="help-desc">show command history</span></div>

  /* ── ls ── */
  ls: (args) => {
    const flags  = args.filter(a => a.startsWith('-')).join('');
    const target = args.find(a => !a.startsWith('-'));
    const path   = resolve(target || '.');
    const node   = getNode(path);
    if (!node)              return `<span class="c-r">ls: cannot access '${esc(target)}': No such file or directory</span>`;
    if (node.type !== 'd') return `<span class="c-r">ls: '${esc(target)}': Not a directory</span>`;

    const showAll  = flags.includes('a');
    const showLong = flags.includes('l');
    const names    = Object.keys(node.children || {});
    let items      = showAll ? ['.', '..', ...names] : names;
    if (!items.length) return '';

    const cls = ch =>
      ch.type === 'd'    ? 'dir' :
      ch.type === 'link' ? 'sym' : 'c-tx';

    if (showLong) {
      const rows = items.map(n => {
        const ch   = (n === '.' || n === '..') ? node : node.children[n];
        const isD  = ch.type === 'd';
        const isL  = ch.type === 'link';
        const perm = isD ? 'drwxr-xr-x' : isL ? 'lrwxrwxrwx' : '-rw-r--r--';
        const sz   = isD ? '  4096' : String(ch.content?.length || 0).padStart(6);
        const suffix = isD ? '/' : isL ? ` -> <span class="c-b">${esc(ch.url)}</span>` : '';
        return `<span class="c-dim">${perm}  segmind ${sz}  </span><span class="${cls(ch)}">${esc(n)}${suffix}</span>`;
      });
      return `<div class="out">${rows.join('\n')}</div>`;
    }

    const cols = items.map(n => {
      const ch = (n === '.' || n === '..') ? node : node.children[n];
      const s  = ch.type === 'd' ? '/' : ch.type === 'link' ? '@' : '';
      return `<span class="${cls(ch)}">${esc(n)}${s}</span>`;
    });
    return `<div class="out" style="display:flex;flex-wrap:wrap;gap:2px 18px">${cols.join('')}</div>`;
  },

  /* ── cd ── */
  cd: (args) => {
    const target = resolve(args[0] || '~');
    const node   = getNode(target);
    if (!node)              return `<span class="c-r">cd: '${esc(args[0] || '')}': No such file or directory</span>`;
    if (node.type !== 'd') return `<span class="c-r">cd: '${esc(args[0])}': Not a directory</span>`;
    cwd = target;
    updatePath();
    return '';
  },

  /* ── pwd ── */
  pwd: () => `<div class="out">${esc(cwd)}</div>`,

  /* ── cat ── */
  cat: (args) => {
    if (!args.length) return `<span class="c-r">cat: missing file operand</span>`;
    const path = resolve(args[0]);
    const node = getNode(path);
    if (!node)             return `<span class="c-r">cat: '${esc(args[0])}': No such file or directory</span>`;
    if (node.type === 'd') return `<span class="c-r">cat: '${esc(args[0])}': Is a directory</span>`;
    if (node.type === 'link') {
      window.open(node.url, '_blank');
      return `<span class="c-g">→ Opening <span class="c-b">${esc(node.url)}</span></span>`;
    }
    return `<div class="out">${esc(node.content || '')}</div>`;
  },

  /* ── tree ── */
  tree: () => {
    const node = getNode(cwd);
    let r = '<div class="out">.\n';
    const walk = (n, prefix) => {
      const entries = Object.entries(n.children || {});
      entries.forEach(([name, child], i) => {
        const last      = i === entries.length - 1;
        const connector = last ? '└── ' : '├── ';
        const cls       = child.type === 'd' ? 'dir' : child.type === 'link' ? 'sym' : 'c-tx';
        const suffix    = child.type === 'd' ? '/' : child.type === 'link' ? '@' : '';
        r += `${esc(prefix)}${connector}<span class="${cls}">${esc(name)}${suffix}</span>\n`;
        if (child.type === 'd') walk(child, prefix + (last ? '    ' : '│   '));
      });
    };
    walk(node, '');
    // count
    const files = Object.values(node.children || {}).filter(c => c.type === 'f' || c.type === 'link').length;
    const dirs  = Object.values(node.children || {}).filter(c => c.type === 'd').length;
    r += `\n<span class="c-dim">${dirs} director${dirs===1?'y':'ies'}, ${files} file${files===1?'':'s'}</span>`;
    return r + '</div>';
  },

  /* ── touch ── */
  touch: (args) => {
    if (!args.length) return `<span class="c-r">touch: missing file operand</span>`;
    const name = args[0];
    const node = getNode(cwd);
    if (!node || node.type !== 'd') return `<span class="c-r">touch: cannot create file here</span>`;
    if (node.children[name]) return `<span class="c-o">'${esc(name)}' already exists — timestamp updated</span>`;
    node.children[name] = { type:'f', content:'' };
    return `<span class="c-g">created '${esc(name)}'</span>`;
  },

  /* ── mkdir ── */
  mkdir: (args) => {
    if (!args.length) return `<span class="c-r">mkdir: missing operand</span>`;
    const name = args[0];
    const node = getNode(cwd);
    if (!node || node.type !== 'd') return `<span class="c-r">mkdir: cannot create directory here</span>`;
    if (node.children[name]) return `<span class="c-r">mkdir: '${esc(name)}': File exists</span>`;
    node.children[name] = { type:'d', children:{} };
    return `<span class="c-g">created directory '${esc(name)}'</span>`;
  },

  /* ── rm ── */
  rm: (args) => {
    if (!args.length) return `<span class="c-r">rm: missing operand</span>`;
    const name = args[0];
    const node = getNode(cwd);
    if (!node || !node.children || !node.children[name])
      return `<span class="c-r">rm: '${esc(name)}': No such file or directory</span>`;
    delete node.children[name];
    return `<span class="c-g">removed '${esc(name)}'</span>`;
  },

const ALL_CMDS = Object.keys(CMD);

/* ════════════════════════════════════════════════
   EXECUTE
════════════════════════════════════════════════ */
const exec = raw => {
  const trimmed = raw.trim();
  if (!trimmed) return;
  hist.push(trimmed);
  histIdx = -1;
  printPrompt(trimmed);

  const parts = trimmed.split(/\s+/);
  const cmd   = parts[0].toLowerCase();
  const args  = parts.slice(1);

  if (CMD[cmd]) {
    const out = CMD[cmd](args);
    if (out != null && out !== '') print(out);
  } else {
    print(`<span class="c-r">bash: ${esc(cmd)}: command not found</span> <span class="c-dim">(try 'help')</span>`);
  }
  scroll();
};

/* ════════════════════════════════════════════════
   TAB COMPLETION
════════════════════════════════════════════════ */
const complete = val => {
  const parts   = val.split(/\s+/);
  const partial = parts[parts.length - 1].toLowerCase();
  if (parts.length <= 1) return ALL_CMDS.filter(c => c.startsWith(partial));
  const node = getNode(cwd);
  if (!node?.children) return [];
  return Object.keys(node.children).filter(n => n.toLowerCase().startsWith(partial));
};

const clearTabMenu = () => {
  tabMenuEl?.remove(); tabMenuEl = null;
  tabMatches = []; tabIdx = -1; tabBase = '';
};

const renderTabMenu = () => {
  tabMenuEl?.remove();
  const div = document.createElement('div');
  div.className = 'tab-menu line';
  tabMatches.forEach((m, i) => {
    const span = document.createElement('span');
    span.className = 'tab-item' + (i === tabIdx ? ' active' : '');
    span.textContent = m;
    div.appendChild(span);
  });
  $out.appendChild(div);
  tabMenuEl = div;
  scroll();
};

const applyTab = () => {
  if (tabIdx < 0 || tabIdx >= tabMatches.length) return;
  const parts = tabBase.split(/\s+/);
  parts[parts.length - 1] = tabMatches[tabIdx];
  $in.value = parts.join(' ');
};

/* ════════════════════════════════════════════════
   INPUT EVENTS
════════════════════════════════════════════════ */
$in.addEventListener('input', () => clearTabMenu());

$in.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const val = $in.value;
    if (!val) return;

    if (!tabMatches.length) {
      const matches = complete(val);
      if (!matches.length) return;
      if (matches.length === 1) {
        const parts = val.split(/\s+/);
        parts[parts.length - 1] = matches[0];
        $in.value = parts.join(' ');
        return;
      }
      tabMatches = matches;
      tabBase    = val;
      tabIdx     = e.shiftKey ? matches.length - 1 : 0;
    } else {
      tabIdx = e.shiftKey
        ? (tabIdx - 1 + tabMatches.length) % tabMatches.length
        : (tabIdx + 1) % tabMatches.length;
    }
    applyTab();
    renderTabMenu();
    return;
  }

  if (e.key === 'Enter') {
    clearTabMenu();
    exec($in.value);
    $in.value = '';
    return;
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < hist.length - 1) {
      histIdx++;
      $in.value = hist[hist.length - 1 - histIdx];
    }
    return;
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) {
      histIdx--;
      $in.value = hist[hist.length - 1 - histIdx];
    } else {
      histIdx = -1;
      $in.value = '';
    }
    return;
  }

  if (e.ctrlKey && e.key === 'l') {
    e.preventDefault();
    CMD.clear();
    return;
  }

  if (e.ctrlKey && e.key === 'c') {
    e.preventDefault();
    printPrompt($in.value + '^C');
    $in.value = '';
    clearTabMenu();
    scroll();
    return;
  }
});
